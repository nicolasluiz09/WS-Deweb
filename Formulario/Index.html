<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formulario de Cadastro</h1>
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outros Inputs</title>
    </head>
    <body>
    <form action="/" method="post">
    <label for="idade">Idade:</label>
    <input type="number" name="idade" id="idade">
    <br><br>
    <label for="genero">Gênero:</label>
    <select name="genero" id="genero" required>
    <option value="" selected disabled>Selecione...</option>
    <option value="feminino">Feminino</option>
    <option value="masculino">Masculino</option>
    </select>
    <br><br>
    <h2>Interesses</h2>
    <input type="checkbox" name="interesses" id="tecnologia" value="tecnologia">
    <label for="tecnologia">Tecnologia</label>
    <br>
    <input type="checkbox" name="interesses" id="esportes" value="esportes">
    <label for="esportes">Esportes</label>
    <br>
    <input type="checkbox" name="interesses" id="musica" value="musica">
    <label for="musica">Música</label>
    <br><br>
    <label>Deseja receber nossa newsletter?</label>
    <br>
    <input type="radio" name="newsletter" id="sim" value="sim">
    <label for="sim">Sim</label>
    <input type="radio" name="newsletter" id="nao" value="nao">
    <label for="nao">Não</label>
    <br><br>
    <h2>Informações Adicionais</h2>
    <label for="sonho">Sonhos:</label>
    <br>
    <textarea
    
                name="sonho"
    
                id="sonho"
    
                rows="5"
    
                cols="20"
    
                placeholder="Conte-nos seus maiores sonhos">
    </textarea>
    <br><br>
    <label for="cor">Cor Favorita:</label>
    <input type="color" name="cor" id="cor">
    <br><br>
    <label for="data">Data de Nascimento:</label>
    <input type="date" name="data" id="data">
    <br><br>
    <label for="arquivo">Envie uma foto:</label>
    <input type="file" name="arquivo" id="arquivo">
    <br><br>
    <button type="submit">Enviar formulário</button>
    </form>
    </body>
    </html>
     
</body>
</html>
