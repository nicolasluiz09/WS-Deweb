<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="titulo">
            <h1>Carrinho de Compras</h1>
            <h2>itens de tecnologia</h2>
        </div>

        <button class="btn-header"><span>+</span>Novo produto</button>
    </header>

    <main>
        <section class="card">
            <h2>Dicionar produto</h2>
            <label for="produto">Produto</label>
            <select name="produto" id="produto">

            </select>
            <label for="quantidade">Quantidade</label>
            <input type="number" name="quantidade" id="quantidade" min="1" value="1">

            <button>Adicionar ao carrinho</button>

            <div class="info">
                <div class="info-imagem" style="width: 150px;">
                    <img src="https://placehold.co/150x150" alt="" />
                  </div>
                  <h3>Mouse</h3>
                  <p>Mouse optico</p>
                  <p>R$ 159,90</p>
                </div>
        </section>

        <section class="card">
            <h2>Produtos no Carrinho</h2>
            <p>Seu carrinho esta vazio</p>
            <hr />
            <div class="summary">
              <div class="summary-total">
                <p>Total</p>
                <p class="total-valor">R$ 0,00</p>
              </div>
              <button class="total-limpar">Limpar</button>
            </div>
          </section>
        </main>
        <script src="script.js"></script>
    </main>
</body>
</html>
