<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de JavaScript</title>
    <style>
        button{
            background-color: navy;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px #aaa;
        }
        button:hover{
            background-color: rgba(0, 0, 128, 0.8);
        }
    </style>
</head>
<body>
    <h1>Exemplo de uso de JavaScript</h1>
    <p id="mensagem">Texto de HTML que será manipulado</p>

    <button onclick="mensagem()">Usando onclick</button>
    <button id="botaoEvento">Usando addEventListener</button>

    <script src="script.js">
        alert("JavaScript Interno");
    </script>
</body>
</html>
