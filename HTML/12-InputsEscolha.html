<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs de Escolha</title>
</head>
<body>
    <h1>Inputs de Escolha</h1>

<form action="./">

    <label for="opção">
    <input type="radio" name="opção">Opção 01
</label>

<label for="opção">
    <input type="radio" name="opção">Opção 02
</label>

<label for="opção">
    <input type="radio" name="opção">Opção 03
</label>
<br/>
    <label for="opções">
        <input type="checkbox" name="opções" id="opção1">Opção 01
    </label>
    <label for="opção">
        <input type="checkbox" name="opções" id="opção2" checked>Opção 02
    </label>
    <label for="opção">
        <input type="checkbox" name="opções" id="opção3">Opção 02
    </label>

</form>

</body>
</html>
