<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Text</title>
</head>
<body>
    <h1>Input Text</h1>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" placeholder="Digite seu nome" value="Nicolas" maxlength="10" minlength="3" required>

    <input type="text" id="sobrenome" placeholder="Digite seu sobrenome" maxlength="10" minlength="3" required autofocus>
    
    <input type="text" id="apelido" placeholder="Digite seu apelido" pattern="[A-Za-z]+" title="Aqui você pode digitar um apelido"  maxlength="10" minlength="3" required autofocus>
</body>
</html>
