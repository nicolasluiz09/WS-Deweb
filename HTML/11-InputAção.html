<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input de Ação</title>
</head>
<body>
    <h1>Inputs de  Ação</h1>

    <label for="número">Número: </label>
    <input type="number" id="idade" min="2" max="10" value="5" title="Digite sua idade" placeholder="idade">

    <label for="senha">Senha: </label>
    <input type="password" id="senha" minlength="10" maxlength="30" required placeholder="Senha" title="Aqui é um campo de senha">

    <label for="confirmação">Confirmação: </label>
    <input type="submit" value="Enviar">
    
    <label for="limpar">Limpa dados do formulario</label>
    <input type="reset" value="Limpar">
</body>
</html>
