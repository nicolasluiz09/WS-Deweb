<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoClasses</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PseudoClasses</h1>
    <h2>Houver</h2>
    <button>Clique aqui</button>
    <h2>Focus</h2>
    <input type="text" placeholder="clique aqui">
    <h2>:active</h2>
    <button>Clique e segure</button>
    <h2>:visited</h2>
    <a href="#">Clique</a>
    <hr/>
    <h2>:disabled</h2>
    <input type="text" value="Desativado" disabled>
    <hr/>
    <h2>:first-child, :last-child- :nth-child(n)</h2>
    <ul>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
        <li>Ultimo</li>
    </ul>
</body>
</html>
