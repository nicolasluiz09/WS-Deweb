<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Position</h2>
    <div class="elemento estatico">
        <p>Static</p>
    </div>
    <div class="elemento relativo">
        <p>Relative</p>
    </div>
    <div class="elemento absoluto">
        <p>Absolute</p>
    </div>
    <div class="elemento absoluto-pai" part="Relative father">
        <p>Relative Father</p>
    <div class="elemento absoluto-filho">
        <p>Absolute Son</p>
    </div>
</div>

</body>
</html>
