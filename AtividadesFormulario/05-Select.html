<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select</title>
</head>
<body>
    <h1>Lista de Seleção</h1>
    <label for="frutas">Escolha uma fruta</label>
    <select name="fruta" id="fruta">
        <option value="maça">MAÇA</option>
        <option value="pera">PERA</option>
        <option value="abacaxi">ABACAXI</option>
        <option value="maracuja">MARACUJA</option>
        <option value="manga">MANGA</option>
    </select>
    <br/>
    <br/>
    <br/>
    <label for="frutas">Escolha outra fruta</label>
    <select name="fruta" id="fruta" multiple>
        <option value="morango">MORANGO</option>
        <option value="uva">UVA</option>
        <option value="melancia">MELANCIA</option>
        <option value="banana">BANANA</option>
    </select>
</body>
</html>
